# Gate corpus manifest — the Trial A0 / V1 planted-contradiction evaluation asset.
#
# Domain: a wind-turbine gearbox high-speed-shaft (HSS) bearing root-cause investigation
# (architecture.md §14's running example: gearbox ⊃ high-speed shaft ⊃ bearing ⊃ rollers).
# Ten authored documents (d01–d10) carry deliberately *planted* items — contradictions,
# dissimilar refuters, an overturning fact, coreference and over-merge traps — so the
# Phase-4 validation gate (and the A1–A7/E1 trials) have a corpus with a known answer key.
#
# Loaded by tests/fixtures/gate_corpus.py, which reuses the Phase-1 loader
# (tests/fixtures/corpus.py: load_corpus(corpus_dir=...)) for the [[documents]] section and
# adds the [[planted]] / [[hypotheses]] layers below. Kept honest by
# tests/unit/test_gate_corpus.py (model-free, DB-free): every planted quote is located in
# its document and must occur **exactly once** (anchors carry the verbatim quote, never a
# hand-counted offset, mirroring tests/fixtures/corpus/manifest.toml).
#
# *** SPOILER / ANSWER KEY ***  This manifest and gate_corpus/README.md name the planted
# items and the true cause. A human annotator (Trial V2) labels the documents BEFORE
# reading either — see gate_corpus/README.md.
#
# V1 scope: documents + the planted inventory + the hypothesis set. **No gold labels** —
# gold_edges / gold_hypothesis_states / gold_faithfulness / gold_entity_clusters /
# gold_levels are Trial V2 and live under gate_corpus/labels/ when they exist.
#
# planted.kind vocabulary (validated against PlantedKind in tests/fixtures/gate_corpus.py):
#   hard_negation | hedge | contradiction | genuine_observation | self_serving_judgement
#   | component_hierarchy | dissimilar_refuter | entity_coref | over_merge_trap
#   | admission_against_interest | attribution | load_bearing_tail_fact
#   | reference_hypothesis_set | overturning_fact
# hypotheses.role vocabulary (validated against HypothesisRole):
#   true_cause | favoured_before_overturn | refuted

schema_version = 1

