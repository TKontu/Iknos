# anchor: min_words > MAX_MODEL_TOKENS (8192) makes ">1 embedding window under the
# production model" provable in CI with no model loaded (SentencePiece emits >= 1 token
# per whitespace word, so tokens >= words). Keep d08 above its floor when editing.
# ─────────────────────────────────────────────────────────────────────────────────────

