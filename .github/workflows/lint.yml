name: lint

# Enforces the project's ruff standard so main can't drift out of format/lint
# compliance. There is a local PostToolUse hook that formats edited files, but
# nothing stopped un-formatted code from being committed — this gate does.
#
# Mirrors the local config in pyproject.toml ([tool.ruff]): line-length 100,
# target py312, rules E/F/I/B/UP/SIM.

on:
  push:
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: ruff check (lint)
        run: uv run ruff check .
